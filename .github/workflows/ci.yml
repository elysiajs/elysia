name: Build and Test

on:
    push:
    pull_request:

jobs:
    build:
        name: Build and test code
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install packages
              run: bun install

            - name: Build code
              run: bun run build

            # Full functional suite (not just test/2) — a PR that breaks any of
            # the ~1630 tests must fail CI. The release gate ran far more than
            # CI did, so regressions slipped through.
            - name: Test
              run: bun test test

            - name: Type-check
              run: bun run test:types

            # - name: Test
            #   run: bun run test:cf

